substitutions:
  device_name: ctek-cs1
  friendly_name: "CTEK CS ONE"
  ctek_mac: !secret ctek_mac
  ctek_passkey: !secret ctek_passkey

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

# Waveshare ESP32-C3-Zero-M
esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG  # C3 uses USB directly, not UART

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_password

# ──────────────────────────────────────────────
# BLE — keyboard_only means the ESP32 supplies
# the passkey automatically without user input
# ──────────────────────────────────────────────
esp32_ble:
  io_capability: keyboard_only

esp32_ble_tracker:

# ──────────────────────────────────────────────
# BLE Client — permanently bonded to CTEK CS ONE
# ──────────────────────────────────────────────
ble_client:
  - mac_address: ${ctek_mac}
    id: ctek_cs1
    on_connect:
      then:
        - lambda: |-
            ESP_LOGI("ctek", "Connected - requesting MITM encryption");
            auto addr = id(ctek_cs1)->get_remote_bda();
            esp_ble_set_encryption(addr, ESP_BLE_SEC_ENCRYPT_MITM);
    on_disconnect:
      then:
        - lambda: 'ESP_LOGI("ctek", "Disconnected from CTEK CS ONE");'
        - light.turn_on:
            id: status_led
            red: 100%
            green: 0%
            blue: 0%
            brightness: 15%
    on_passkey_request:
      then:
        - lambda: 'ESP_LOGI("ctek", "Passkey requested - replying automatically");'
        - ble_client.passkey_reply:
            id: ctek_cs1
            passkey: ${ctek_passkey}

# ──────────────────────────────────────────────
# WS2812 RGB LED on GPIO10 (Waveshare C3-Zero-M)
# Green = connected, Red = disconnected
# ──────────────────────────────────────────────
light:
  - platform: esp32_rmt_led_strip
    rgb_order: RGB
    chipset: WS2812
    pin: GPIO10
    num_leds: 1
    id: status_led
    name: "Status LED"
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# All characteristics from service f00a0001-d91a-4679-9261-542c9bc01626
sensor:

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_voltage_external
    name: "Battery Voltage"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0002-d91a-4679-9261-542c9bc01626"
    update_interval: 30s
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    lambda: |-
      uint16_t raw = (x[0] << 8) | x[1];
      return raw / 1000.0;
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(ctek_firmware).state == "";'
            then:
              - component.update: ctek_firmware
              - component.update: ctek_program_names
        - light.turn_on:
            id: status_led
            red: 0%
            green: 100%
            blue: 0%
            brightness: 11%

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_voltage_out
    name: "Charger Voltage Out"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0003-d91a-4679-9261-542c9bc01626"
    update_interval: 30s
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    lambda: |-
      uint16_t raw = (x[0] << 8) | x[1];
      return raw / 1000.0;

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_current_out
    name: "Charge Current"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0004-d91a-4679-9261-542c9bc01626"
    update_interval: 30s
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 3
    lambda: |-
      uint16_t raw = (x[0] << 8) | x[1];
      return raw / 1000.0;

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_temp_ambient
    name: "Charger Temperature"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0007-d91a-4679-9261-542c9bc01626"
    update_interval: 60s
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      int16_t raw = (x[0] << 8) | x[1];
      return raw / 100.0;

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_voltage_setpoint
    name: "Voltage Setpoint"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0008-d91a-4679-9261-542c9bc01626"
    update_interval: 60s
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    lambda: |-
      uint16_t raw = (x[0] << 8) | x[1];
      return raw / 1000.0;

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_current_setpoint
    name: "Current Setpoint"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0009-d91a-4679-9261-542c9bc01626"
    update_interval: 60s
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 3
    lambda: |-
      uint16_t raw = (x[0] << 8) | x[1];
      return raw / 1000.0;

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_battery_capacity
    name: "Estimated Battery Capacity"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0015-d91a-4679-9261-542c9bc01626"
    update_interval: 60s
    unit_of_measurement: "Ah"
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      uint16_t raw = (x[0] << 8) | x[1];
      return (float)raw;

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_soc
    name: "Battery SOC"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0027-d91a-4679-9261-542c9bc01626"
    update_interval: 30s
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      return (float)x[1];

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_remaining_hours
    name: "Remaining Time"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0028-d91a-4679-9261-542c9bc01626"
    update_interval: 60s
    unit_of_measurement: "h"
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      uint16_t raw = (x[0] << 8) | x[1];
      return (float)raw;

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_charge_status
    name: "Charge Status"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0029-d91a-4679-9261-542c9bc01626"
    update_interval: 30s
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      uint16_t raw = (x[0] << 8) | x[1];
      return (float)raw;

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_charger_state
    name: "Charger State"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0037-d91a-4679-9261-542c9bc01626"
    update_interval: 30s
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      uint16_t raw = (x[0] << 8) | x[1];
      return (float)raw;

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_charge_time
    name: "Total Charge Time"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0023-d91a-4679-9261-542c9bc01626"
    update_interval: 60s
    unit_of_measurement: "s"
    state_class: total_increasing
    accuracy_decimals: 0
    lambda: |-
      uint32_t raw = (x[0] << 24) | (x[1] << 16) | (x[2] << 8) | x[3];
      return (float)raw;

  - platform: ble_client
    type: characteristic
    ble_client_id: ctek_cs1
    id: ctek_detected_chemistry
    name: "Detected Battery Chemistry"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0014-d91a-4679-9261-542c9bc01626"
    update_interval: 300s
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      uint16_t raw = (x[0] << 8) | x[1];
      return (float)raw;

# ──────────────────────────────────────────────
# Text sensors for string values
# ──────────────────────────────────────────────
text_sensor:
  - platform: ble_client
    ble_client_id: ctek_cs1
    id: ctek_program_names
    name: "Available Programs"
    service_uuid: "f00a0001-d91a-4679-9261-542c9bc01626"
    characteristic_uuid: "f00a0031-d91a-4679-9261-542c9bc01626"
    update_interval: never

  - platform: ble_client
    ble_client_id: ctek_cs1
    id: ctek_firmware
    name: "Firmware Version"
    service_uuid: "0000180a-0000-1000-8000-00805f9b34fb"
    characteristic_uuid: "00002a26-0000-1000-8000-00805f9b34fb"
    update_interval: never

# Keep BLE client active
switch:
  - platform: ble_client
    ble_client_id: ctek_cs1
    name: "CTEK BLE Connection"
    id: ctek_ble_switch
    restore_mode: ALWAYS_ON
